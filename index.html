<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2.5D Snakebird</title>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- Main menu -->
    <div id="main-menu">
      <div class="menu-panel">
        <h1>404 Snake</h1>
        <p>Snakebird-style puzzle levels</p>
        <div class="menu-actions">
          <button id="btn-start">Start</button>
          <button id="btn-level-select">Level Select</button>
        </div>
        <div id="level-select" class="level-select hidden"></div>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-row"><span class="hud-label">Level</span><span id="hud-level">-</span></div>
      <div class="hud-row"><span class="hud-label">Fruit left</span><span id="hud-fruit">0</span></div>
      <div class="hud-row"><span class="hud-label">Moves</span><span id="hud-moves">0</span></div>
    </div>

    <!-- Controls -->
    <div id="controls" class="hidden">
      <div class="ctrl-group">
        <span class="ctrl-title">View</span>
        <button data-view="front">Front</button>
        <button data-view="iso">Iso</button>
        <button data-view="orbit">Orbit</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-title">Lights</span>
        <button id="btn-light">Key light: ON</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-title">Game</span>
        <button id="btn-prev">Prev (P)</button>
        <button id="btn-next">Next (N)</button>
        <button id="btn-undo">Undo (U)</button>
        <button id="btn-reset">Reset (R)</button>
        <button id="btn-main-menu">Main Menu (M)</button>
      </div>
    </div>

    <div id="hint">Move: WASD / Arrows &nbsp;|&nbsp; Controls: Esc &nbsp;|&nbsp; Main Menu: M &nbsp;|&nbsp; Drag to orbit</div>

    <!-- Win / lose overlay -->
    <div id="overlay" class="hidden">
      <div class="overlay-card">
        <h1 id="overlay-title">You win!</h1>
        <p id="overlay-text">Level complete.</p>
        <button id="overlay-btn">Play again (R)</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
